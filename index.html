<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Trainer</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[#f5f5f7] flex flex-col items-center justify-center p-6 text-[#1d1d1f] selection:bg-gray-200">
    
    <main class="w-full max-w-4xl bg-white p-10 md:p-16 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative overflow-hidden flex flex-col gap-8">
        <!-- Header -->
        <header class="flex justify-between items-center z-10 w-full">
            <div class="flex items-center gap-2 font-semibold text-xl tracking-tight">
                <i data-lucide="keyboard" class="w-6 h-6"></i>
                <span>Type</span>
            </div>
            <button id="settings-btn" class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-400 hover:text-black">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </header>

        <!-- Hidden Input for capturing keystrokes -->
        <input type="text" id="hidden-input" class="opacity-0 absolute -z-10" autofocus autocomplete="off" autocorrect="off" spellcheck="false">

        <!-- Typing Area -->
        <div id="typing-area" class="flex flex-col gap-12 transition-all duration-400">
            <!-- Progress -->
            <div class="flex items-center justify-between text-sm font-medium text-gray-400">
                <div class="flex items-center gap-4 w-full max-w-sm">
                    <div class="flex items-center gap-1 w-16">
                        <span id="progress-current" class="text-black">0</span>
                        <span class="text-gray-300">/</span>
                        <span id="progress-total">0</span>
                    </div>
                    <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-black transition-all duration-200 ease-out rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <div class="flex items-center gap-2 bg-gray-50 px-4 py-1.5 rounded-full border border-gray-100">
                    <i data-lucide="activity" class="w-4 h-4"></i>
                    <span class="text-black font-semibold"><span id="live-wpm">0</span> <span class="text-gray-400 font-medium">WPM</span></span>
                </div>
            </div>

            <!-- Text Display -->
            <div id="text-display" class="text-[24px] md:text-[28px] leading-[1.6] tracking-wide font-medium text-left max-h-[50vh] overflow-y-auto pr-4 scrollbar-hide" style="word-spacing: 0.1em;">
                <!-- Spans will be injected here by JS -->
            </div>

            <div id="start-prompt" class="text-center text-gray-400 text-sm mt-4 flex items-center justify-center gap-2 transition-opacity duration-500">
                <i data-lucide="keyboard" class="w-4 h-4"></i>
                Начните печатать
            </div>
        </div>

        <!-- Results Area -->
        <div id="results-area" class="hidden flex-col items-center gap-10 py-4 fade-in">
            <div class="text-center space-y-2">
                <h2 class="text-4xl font-semibold tracking-tight">Сессия завершена</h2>
                <p class="text-gray-500">Вот ваши результаты.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                <div class="flex flex-col items-center p-8 bg-[#f5f5f7] rounded-3xl border border-gray-100/50">
                    <div class="text-gray-400 mb-4 bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="activity"></i></div>
                    <div class="text-sm font-medium text-gray-500 mb-2 uppercase tracking-wider">Скорость</div>
                    <div id="result-wpm" class="text-4xl font-semibold tracking-tight text-black">0 WPM</div>
                </div>
                <div class="flex flex-col items-center p-8 bg-[#f5f5f7] rounded-3xl border border-gray-100/50">
                    <div class="text-gray-400 mb-4 bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="target"></i></div>
                    <div class="text-sm font-medium text-gray-500 mb-2 uppercase tracking-wider">Точность</div>
                    <div id="result-accuracy" class="text-4xl font-semibold tracking-tight">0%</div>
                </div>
                <div class="flex flex-col items-center p-8 bg-[#f5f5f7] rounded-3xl border border-gray-100/50">
                    <div class="text-gray-400 mb-4 bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="alert-circle"></i></div>
                    <div class="text-sm font-medium text-gray-500 mb-2 uppercase tracking-wider">Ошибки</div>
                    <div id="result-errors" class="text-4xl font-semibold tracking-tight">0</div>
                </div>
            </div>

            <button id="retry-btn" class="mt-6 px-8 py-4 bg-black text-white rounded-full font-medium flex items-center gap-2 hover:bg-gray-800 transition-all hover:scale-105 active:scale-95 shadow-lg shadow-black/10">
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                Попробовать снова
            </button>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm p-4 fade-in">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl flex flex-col gap-6 scale-in" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-semibold tracking-tight">Настройки</h2>
                <button id="close-settings-btn" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Language -->
                <div class="space-y-3">
                    <label class="text-sm font-medium text-gray-500 uppercase tracking-wider">Язык</label>
                    <div class="flex bg-gray-100 p-1 rounded-xl" id="lang-selector">
                        <button data-val="ru" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white shadow-sm text-black">Русский</button>
                        <button data-val="en" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-500 hover:text-black">English</button>
                    </div>
                </div>

                <!-- Mode -->
                <div class="space-y-3">
                    <label class="text-sm font-medium text-gray-500 uppercase tracking-wider">Режим</label>
                    <div class="flex bg-gray-100 p-1 rounded-xl" id="mode-selector">
                        <button data-val="words" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white shadow-sm text-black">Слова</button>
                        <button data-val="quotes" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-500 hover:text-black">Цитаты</button>
                        <button data-val="custom" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-500 hover:text-black">Свой текст</button>
                    </div>
                </div>

                <!-- Word Count -->
                <div class="space-y-3" id="word-count-container">
                    <label class="text-sm font-medium text-gray-500 uppercase tracking-wider">Количество слов</label>
                    <div class="flex bg-gray-100 p-1 rounded-xl" id="word-count-selector">
                        <button data-val="10" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-500 hover:text-black">10</button>
                        <button data-val="25" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white shadow-sm text-black">25</button>
                        <button data-val="50" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-500 hover:text-black">50</button>
                    </div>
                </div>

                <!-- Custom Text -->
                <div class="space-y-3 hidden" id="custom-text-container">
                    <label class="text-sm font-medium text-gray-500 uppercase tracking-wider">Ваш текст</label>
                    <textarea id="custom-text-input" class="w-full h-32 p-4 bg-gray-50 border border-gray-200 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-black/5" placeholder="Вставьте текст сюда...">Введите свой текст здесь...</textarea>
                </div>

                <!-- Toggles -->
                <div class="space-y-4 pt-2" id="toggles-container">
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-gray-700 font-medium group-hover:text-black transition-colors">Включить цифры</span>
                        <input type="checkbox" id="toggle-numbers" class="sr-only">
                        <div class="w-12 h-6 rounded-full p-1 transition-colors duration-300 ease-in-out bg-gray-200" id="toggle-numbers-bg">
                            <div class="w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-300 ease-in-out translate-x-0" id="toggle-numbers-knob"></div>
                        </div>
                    </label>
                    <label class="flex items-center justify-between cursor-pointer group">
                        <span class="text-gray-700 font-medium group-hover:text-black transition-colors">Включить знаки препинания</span>
                        <input type="checkbox" id="toggle-punctuation" class="sr-only">
                        <div class="w-12 h-6 rounded-full p-1 transition-colors duration-300 ease-in-out bg-gray-200" id="toggle-punctuation-bg">
                            <div class="w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-300 ease-in-out translate-x-0" id="toggle-punctuation-knob"></div>
                        </div>
                    </label>
                </div>
            </div>

            <button id="save-settings-btn" class="w-full py-4 mt-2 bg-black text-white rounded-full font-medium hover:bg-gray-800 transition-colors">
                Применить
            </button>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="script.js"></script>
</body>
</html>
